<script>
(function(){

const ARCHETYPES = [
  { id:'tradicional', name:'Traditional/Conservative', chakra:'Root', color:'#EF4444', article:'personalidade-basico.html' },
  { id:'criativa',    name:'Creative/Dynamic',      chakra:'Sacral', color:'#F97316', article:'personalidade-sacral.html' },
  { id:'ambiciosa',   name:'Ambitious / Confident',  chakra:'Solar Plexus', color:'#EAB308', article:'personalidade-plexo-solar.html' },
  { id:'empatica',    name:'Empathetic / Friendly',    chakra:'Heart', color:'#22C55E', article:'personalidade-cardiaco.html' },
  { id:'intelectual', name:'Intellectual / Curious',  chakra:'Third Eye', color:'#8B5CF6', article:'personalidade-frontal.html' },
  { id:'expressiva',  name:'Expressive / Communicative', chakra:'Throat', color:'#3B82F6', article:'personalidade-laringeo.html' },
  { id:'espiritualista', name:'Spiritual / Intuitive', chakra:'Crown', color:'#A855F7', article:'personalidade-coronario.html' }
];

const QUESTIONS = [
  {
    title:'What matters most to you in a friendship?',
    options:[
      { archId:'tradicional',    text:'People who have always been by my side, who think like me and share the same lifestyle.' },
      { archId:'criativa',       text:'People who are fun, sociable, easygoing and good-humored.' },
      { archId:'ambiciosa',      text:'People who stand out, with power, success, influence and ambition.' },
      { archId:'empatica',       text:'People I can help or support, whether intellectually, materially, emotionally or physically.' },
      { archId:'intelectual',    text:'People I can have deep conversations with or learn from.' },
      { archId:'expressiva',     text:'People I can influence and impact, who admire me, give me attention or recognize me.' },
      { archId:'espiritualista', text:'People who are spiritual and intuitive, who do not care so much about material things.' }
    ]
  },
  {
    title:'What would you most enjoy doing in your free time?',
    options:[
      { archId:'tradicional',    text:'Doing things that relax me or that I already know well and feel comfortable with.' },
      { archId:'criativa',       text:'Doing different things and having fun, like going to events and parties, listening to music, being with friends, playing sports, enjoying art, cooking, dancing and more.' },
      { archId:'ambiciosa',      text:'Doing something that brings me recognition, money, challenges, new skills or that ties into my ambition.' },
      { archId:'empatica',       text:'Helping, contributing or supporting people or animals, whether intellectually, materially, physically or emotionally.' },
      { archId:'intelectual',    text:'Learning new subjects or going deeper into some field of knowledge.' },
      { archId:'expressiva',     text:'Communicating, influencing or getting attention from people.' },
      { archId:'espiritualista', text:'Doing some spiritual practice, seeking spiritual experiences or missions, or bringing different areas together.' }
    ]
  },
  {
    title:'Which of these job options would suit you best?',
    options:[
      { archId:'tradicional',    text:'Having a profession or calling where I can perform well and enjoy stability, without drastic changes or heavy pressure.' },
      { archId:'criativa',       text:'Having a profession or calling that is fun and involves people, socializing, or activities like art, sports, dance, cooking, painting and more.' },
      { archId:'ambiciosa',      text:'Having a profession or calling that matches my ambition, bringing success, money, influence, impact and growth.' },
      { archId:'empatica',       text:'Having a profession or calling where I can help or contribute to people, whether intellectually, physically or materially.' },
      { archId:'intelectual',    text:'Having a profession or calling where you can put your intelligence to work, keep learning and going deeper, create new solutions or improve existing ones.' },
      { archId:'expressiva',     text:'Having a profession or calling where I can influence people or get their attention, whether online or in person, using my body, voice or intellect.' },
      { archId:'espiritualista', text:'Having a profession or calling where you carry out your spiritual mission or contribute to people\'s spirituality.' }
    ]
  },
  {
    title:'Which stereotype fits you best?',
    options:[
      { archId:'tradicional',    text:'I am someone who likes to go with the flow of life, hold a good job, enjoy the moment, and make the most of family, friends and children.' },
      { archId:'criativa',       text:'I am someone who wants to experience life, have fun and do different things, and I am emotional and sensitive.' },
      { archId:'ambiciosa',      text:'I am a very ambitious person. I need to stand out in what I do, I like to compete and I want to be among the best.' },
      { archId:'empatica',       text:'I am an empathetic person. I like to help people or animals, and I find it hard to say \'no\' or to disconnect from other people\'s emotions and problems.' },
      { archId:'intelectual',    text:'I am a very curious person. I am always questioning things and looking to learn more. I have an analytical mind.' },
      { archId:'expressiva',     text:'I am a communicative person. I like to express my ideas and to be heard and noticed by others. I am always looking to communicate or to get attention and influence from people.' },
      { archId:'espiritualista', text:'I am an intuitive or spiritual person. I try to see things in a more holistic way, not just in material terms.' }
    ]
  },
  {
    title:'If you had a sum of money that let you stop working and use it however you wanted, how would you use it?',
    options:[
      { archId:'tradicional',    text:'I would use this money wisely and keep it saved.' },
      { archId:'criativa',       text:'I would use this money to enjoy life, spending it on fun, travel, socializing, art, culture and food.' },
      { archId:'ambiciosa',      text:'I would use this money to make more money, directly or indirectly, or to buy something meaningful.' },
      { archId:'empatica',       text:'I would use this money both for my own benefit and to help other people.' },
      { archId:'intelectual',    text:'I would use this money to broaden my knowledge, investing in courses, books, tools and experiments.' },
      { archId:'expressiva',     text:'I would use this money to expand my influence, investing in ways to promote myself and grow my visibility.' },
      { archId:'espiritualista', text:'I would use this money to cut back on my obligations and devote more time to my spiritual practices or my spiritual mission.' }
    ]
  }
];

const POINTS = [35, 30, 15, 10, 5, 5, 5];

let page = 'welcome';
let currentQ = 0;
const rankings = [];
for (let i = 0; i < QUESTIONS.length; i++) {
  const shuffled = QUESTIONS[i].options.slice();
  for (let j = shuffled.length - 1; j > 0; j--) {
    const k = Math.floor(Math.random() * (j + 1));
    [shuffled[j], shuffled[k]] = [shuffled[k], shuffled[j]];
  }
  rankings.push(shuffled.map(o => o.archId));
}

let dragIdx = null;

function getArchetype(id) {
  return ARCHETYPES.find(a => a.id === id);
}

function posClass(i) {
  if (i === 0) return 'pos-1';
  if (i === 1) return 'pos-2';
  if (i === 2) return 'pos-3';
  return 'pos-rest';
}

function render() {
  const app = document.getElementById('pqApp');
  if (page === 'welcome') return renderWelcome(app);
  if (page === 'quiz') return renderQuiz(app);
  if (page === 'result') return renderResult(app);
}

function renderWelcome(app) {
  app.innerHTML = `
    <div class="pq-welcome">
      <div class="pq-welcome-icon">&#10022;</div>
      <h1>Personality Profile</h1>
      <p>Discover which of the <strong>7 frequencies/personalities</strong> fit you best, based on the chakra archetypes of The Soul Game.</p>
      <p>You will answer <strong>5 questions</strong>. In each one, rank the 7 options from the one that represents you most (top) to the one that represents you least (bottom).</p>
      <p><strong>Important:</strong> try to answer based on what you would most like about each option, not on what you are or feel you have to be right now.</p>
      <button class="pq-btn-start" onclick="startQuiz()">Start</button>
    </div>`;
}

function renderQuiz(app) {
  const q = QUESTIONS[currentQ];
  const rank = rankings[currentQ];
  const pct = ((currentQ) / QUESTIONS.length * 100).toFixed(0);

  let items = '';
  rank.forEach((archId, i) => {
    const opt = q.options.find(o => o.archId === archId);
    const a = getArchetype(archId);
    const pts = POINTS[i];
    const ptsClass = i < 2 ? 'pts-high' : '';
    items += `
      <div class="pq-rank-item" draggable="true" data-idx="${i}"
           ondragstart="onDragStart(event,${i})"
           ondragover="onDragOver(event,${i})"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event,${i})"
           ontouchstart="onTouchStart(event,${i})"
           ontouchmove="onTouchMove(event)"
           ontouchend="onTouchEnd(event)">
        <span class="pq-rank-pos ${posClass(i)}">${i + 1}</span>
        <span class="pq-rank-text">${opt.text}</span>
        <span class="pq-rank-pts ${ptsClass}">${pts}pts</span>
        <span class="pq-rank-arrows">
          <button class="pq-arrow-btn" onclick="moveItem(${i},-1)" ${i === 0 ? 'disabled' : ''} aria-label="Move up">&#9650;</button>
          <button class="pq-arrow-btn" onclick="moveItem(${i},1)" ${i === 6 ? 'disabled' : ''} aria-label="Move down">&#9660;</button>
        </span>
      </div>`;
  });

  const isLast = currentQ === QUESTIONS.length - 1;

  app.innerHTML = `
    <div class="pq-progress">
      <div class="pq-progress-track"><div class="pq-progress-fill" style="width:${pct}%"></div></div>
      <div class="pq-progress-label"><span>Question ${currentQ + 1} of ${QUESTIONS.length}</span><span>${pct}%</span></div>
    </div>
    <div class="pq-question-header">
      <h2>${q.title}</h2>
      <p class="pq-instruction">Drag or use the arrows to rank from what fits you most (top) to what fits you least (bottom).</p>
    </div>
    <div class="pq-ranking-list" id="rankingList">${items}</div>
    <div class="pq-nav">
      <button class="pq-btn-prev" onclick="prevQ()" ${currentQ === 0 ? 'disabled' : ''}>Previous</button>
      ${isLast
        ? '<button class="pq-btn-result" onclick="showResult()">See Result</button>'
        : '<button class="pq-btn-next" onclick="nextQ()">Next</button>'}
    </div>`;
}

function calcScores() {
  const scores = {};
  ARCHETYPES.forEach(a => { scores[a.id] = 0; });
  rankings.forEach((rank) => {
    rank.forEach((archId, pos) => {
      scores[archId] += POINTS[pos];
    });
  });
  const sorted = ARCHETYPES.map(a => ({ ...a, score: scores[a.id] }))
    .sort((a, b) => b.score - a.score);
  return sorted;
}

function renderResult(app) {
  const sorted = calcScores();
  const max = 175;

  let cards = '';
  sorted.forEach((a, i) => {
    const rankNum = i + 1;
    let cardClass = '';
    let rankClass = 'rank-rest';
    if (i === 0) { cardClass = 'top-1'; rankClass = 'rank-1'; }
    else if (i === 1) { cardClass = 'top-2'; rankClass = 'rank-2'; }
    else if (i === 2) { cardClass = 'top-3'; rankClass = 'rank-3'; }

    const pct = ((a.score / max) * 100).toFixed(0);

    cards += `
      <div class="pq-result-card ${cardClass}">
        <span class="pq-result-rank ${rankClass}">${rankNum}</span>
        <div class="pq-result-info">
          <p class="pq-result-name">${a.name}</p>
          <span class="pq-result-chakra">${a.chakra} Chakra</span>
          <a class="pq-result-link" href="${a.article}" style="color:${a.color}">Explore this profile →</a>
        </div>
        <div class="pq-result-bar-wrap">
          <div class="pq-result-bar-track"><div class="pq-result-bar-fill" style="width:${pct}%;background:${a.color}"></div></div>
          <span class="pq-result-bar-label" style="color:${a.color}">${a.score} pts</span>
        </div>
      </div>`;
  });

  app.innerHTML = `
    <div class="pq-result-header">
      <div class="pq-result-icon">&#10022;</div>
      <h2>Your Personality Profile</h2>
      <p>Based on your answers, this is the order of the personalities that fit you best.</p>
    </div>
    <div class="pq-result-list">${cards}</div>
    <div class="pq-caveat">
      <p><strong>Important:</strong> Everyone carries all 7 personalities at different intensities. This result is an initial indication. According to the methodology, about 50% of people recognize themselves in the result right away, while the other 50% may notice shifts as they go deeper into self-knowledge.</p>
    </div>
    <div class="pq-result-actions">
      <button class="pq-btn-prev" onclick="backToQuiz()">Retake</button>
      <button class="pq-btn-result" onclick="downloadPDF()">Download PDF</button>
    </div>
    <p class="pq-disclaimer">The Soul Game &middot; Self-knowledge and personal growth</p>`;
}

/* ---- Navigation ---- */
window.startQuiz = function() {
  page = 'quiz';
  currentQ = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.nextQ = function() {
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
};

window.prevQ = function() {
  if (currentQ > 0) {
    currentQ--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
};

window.showResult = function() {
  page = 'result';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.backToQuiz = function() {
  page = 'quiz';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

/* ---- Reorder via arrows ---- */
window.moveItem = function(idx, dir) {
  const rank = rankings[currentQ];
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= rank.length) return;
  [rank[idx], rank[newIdx]] = [rank[newIdx], rank[idx]];
  render();
};

/* ---- Drag & Drop (desktop) ---- */
window.onDragStart = function(e, idx) {
  dragIdx = idx;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
};

window.onDragOver = function(e, idx) {
  e.preventDefault();
  const items = document.querySelectorAll('.pq-rank-item');
  items.forEach(el => el.classList.remove('drag-over'));
  if (idx !== dragIdx) {
    items[idx].classList.add('drag-over');
  }
};

window.onDragLeave = function(e) {
  e.target.classList.remove('drag-over');
};

window.onDrop = function(e, dropIdx) {
  e.preventDefault();
  document.querySelectorAll('.pq-rank-item').forEach(el => {
    el.classList.remove('drag-over', 'dragging');
  });
  if (dragIdx === null || dragIdx === dropIdx) return;
  const rank = rankings[currentQ];
  const item = rank.splice(dragIdx, 1)[0];
  rank.splice(dropIdx, 0, item);
  dragIdx = null;
  render();
};

/* ---- Touch Drag (mobile) ---- */
let touchStartIdx = null;
let touchClone = null;
let touchStartY = 0;

window.onTouchStart = function(e, idx) {
  touchStartIdx = idx;
  touchStartY = e.touches[0].clientY;
  const el = e.currentTarget;
  touchClone = el.cloneNode(true);
  touchClone.style.position = 'fixed';
  touchClone.style.left = el.getBoundingClientRect().left + 'px';
  touchClone.style.top = el.getBoundingClientRect().top + 'px';
  touchClone.style.width = el.offsetWidth + 'px';
  touchClone.style.zIndex = '9999';
  touchClone.style.opacity = '0.85';
  touchClone.style.pointerEvents = 'none';
  touchClone.style.boxShadow = '0 8px 30px rgba(0,0,0,0.4)';
  touchClone.style.transform = 'scale(1.03)';
  document.body.appendChild(touchClone);
  el.classList.add('dragging');
};

window.onTouchMove = function(e) {
  if (touchClone) {
    e.preventDefault();
    const y = e.touches[0].clientY;
    const dy = y - touchStartY;
    const origTop = parseFloat(touchClone.style.top);
    touchClone.style.transform = `scale(1.03) translateY(${dy}px)`;

    const items = document.querySelectorAll('.pq-rank-item');
    items.forEach(el => el.classList.remove('drag-over'));
    items.forEach((el, idx) => {
      if (idx === touchStartIdx) return;
      const rect = el.getBoundingClientRect();
      if (y > rect.top && y < rect.bottom) {
        el.classList.add('drag-over');
      }
    });
  }
};

window.onTouchEnd = function(e) {
  if (touchClone) {
    document.body.removeChild(touchClone);
    touchClone = null;
  }
  document.querySelectorAll('.pq-rank-item').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
  if (touchStartIdx === null) return;
  const y = e.changedTouches[0].clientY;
  const items = document.querySelectorAll('.pq-rank-item');
  let dropIdx = touchStartIdx;
  items.forEach((el, idx) => {
    const rect = el.getBoundingClientRect();
    if (y > rect.top && y < rect.bottom) {
      dropIdx = idx;
    }
  });
  if (dropIdx !== touchStartIdx) {
    const rank = rankings[currentQ];
    const item = rank.splice(touchStartIdx, 1)[0];
    rank.splice(dropIdx, 0, item);
    render();
  }
  touchStartIdx = null;
};

/* ---- PDF Generation ---- */
window.downloadPDF = function() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const pw = doc.internal.pageSize.getWidth();
  const ph = doc.internal.pageSize.getHeight();
  const mx = 18;
  let y = 20;

  function checkPage(need) {
    if (y + need > ph - 20) {
      doc.addPage();
      y = 20;
    }
  }

  // Header
  doc.setFillColor(10, 10, 15);
  doc.rect(0, 0, pw, ph, 'F');
  doc.setTextColor(240, 239, 244);

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.text('Personality Profile', pw / 2, y, { align: 'center' });
  y += 7;
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(186, 181, 200);
  doc.text('The Soul Game - Personality Quiz', pw / 2, y, { align: 'center' });
  y += 5;
  const today = new Date();
  doc.setFontSize(8);
  doc.text('Date: ' + today.toLocaleDateString('en-US'), pw / 2, y, { align: 'center' });
  y += 12;

  // Line
  doc.setDrawColor(60, 60, 80);
  doc.line(mx, y, pw - mx, y);
  y += 8;

  // Section 1: Answers per question
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.setTextColor(240, 239, 244);
  doc.text('YOUR ANSWERS', mx, y);
  y += 8;

  QUESTIONS.forEach((q, qi) => {
    checkPage(60);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(167, 139, 250);
    doc.text('Question ' + (qi + 1) + ': ' + q.title.substring(0, 80), mx, y);
    y += 6;

    const rank = rankings[qi];
    rank.forEach((archId, pos) => {
      checkPage(8);
      const opt = q.options.find(o => o.archId === archId);
      const pts = POINTS[pos];
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);

      if (pos < 2) {
        doc.setTextColor(245, 158, 11);
      } else {
        doc.setTextColor(186, 181, 200);
      }

      const posLabel = '#' + (pos + 1) + ' (' + pts + 'pts)';
      doc.text(posLabel, mx, y);

      doc.setTextColor(220, 218, 230);
      const lines = doc.splitTextToSize(opt.text, pw - mx * 2 - 30);
      doc.text(lines, mx + 28, y);
      y += lines.length * 4 + 2;
    });
    y += 4;
  });

  // Section 2: Results
  checkPage(40);
  doc.setDrawColor(60, 60, 80);
  doc.line(mx, y, pw - mx, y);
  y += 8;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.setTextColor(240, 239, 244);
  doc.text('FINAL RESULT', mx, y);
  y += 8;

  const sorted = calcScores();
  const maxPts = 175;

  sorted.forEach((a, i) => {
    checkPage(12);
    const rankNum = i + 1;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);

    if (i === 0) doc.setTextColor(245, 158, 11);
    else if (i === 1) doc.setTextColor(139, 92, 246);
    else if (i === 2) doc.setTextColor(236, 72, 153);
    else doc.setTextColor(186, 181, 200);

    doc.text('#' + rankNum + '  ' + a.name, mx, y);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.text(a.chakra + ' Chakra  -  ' + a.score + ' pts (' + ((a.score / maxPts) * 100).toFixed(0) + '%)', mx + 2, y + 4);

    // Bar
    const barX = pw - mx - 50;
    const barW = 48;
    const barH = 4;
    doc.setFillColor(37, 37, 53);
    doc.roundedRect(barX, y - 2.5, barW, barH, 1.5, 1.5, 'F');

    const fillW = (a.score / maxPts) * barW;
    const rgb = hexToRgb(a.color);
    doc.setFillColor(rgb.r, rgb.g, rgb.b);
    doc.roundedRect(barX, y - 2.5, fillW, barH, 1.5, 1.5, 'F');

    y += 12;
  });

  // Caveat
  checkPage(20);
  y += 4;
  doc.setFont('helvetica', 'italic');
  doc.setFontSize(7);
  doc.setTextColor(122, 118, 144);
  const caveat = 'Important: Everyone carries all 7 personalities at different intensities. This result is an initial indication. According to the methodology, about 50% of people recognize themselves in the result right away, while the other 50% may notice shifts as they go deeper into self-knowledge.';
  const cavLines = doc.splitTextToSize(caveat, pw - mx * 2);
  doc.text(cavLines, mx, y);
  y += cavLines.length * 3 + 6;

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7);
  doc.text('The Soul Game - Self-knowledge and personal growth', pw / 2, y, { align: 'center' });

  doc.save('personality-profile-' + today.toISOString().slice(0, 10) + '.pdf');
};

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

render();
})();
