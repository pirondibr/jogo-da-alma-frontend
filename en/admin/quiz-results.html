<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Results Admin · The Soul Game</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../quiz-base.css">
  <script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <style>
    .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }
    .admin-card {
      background: var(--bg-card);
      border: 1px solid var(--surface-light);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 20px;
    }
    .admin-card h1 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .admin-card h2 {
      font-family: var(--font-display);
      font-size: 1.25rem;
      margin-bottom: 14px;
    }
    .admin-muted { color: var(--text-muted); font-size: 0.92rem; margin-bottom: 20px; }
    .admin-form { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; }
    .admin-field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 180px; }
    .admin-field label { font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; }
    .admin-field input {
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid var(--surface-light);
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
    }
    .admin-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 999px;
      background: var(--accent-dark);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
    }
    .admin-btn.secondary {
      background: transparent;
      border: 1px solid var(--surface-light);
      color: var(--text-secondary);
    }
    .admin-error { color: #f87171; margin-top: 12px; font-size: 0.9rem; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .stat {
      background: var(--bg);
      border: 1px solid var(--surface-light);
      border-radius: 14px;
      padding: 16px;
    }
    .stat b { display: block; font-size: 1.6rem; font-family: var(--font-display); margin-bottom: 4px; }
    .stat span { color: var(--text-muted); font-size: 0.82rem; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .admin-table th, .admin-table td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--surface);
      vertical-align: top;
    }
    .admin-table th { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-chakra { background: rgba(167,139,250,.15); color: #c4b5fd; }
    .badge-personality { background: rgba(34,197,94,.12); color: #86efac; }
    .row-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-start;
    }
    .row-actions .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .row-actions button {
      background: transparent;
      border: 1px solid var(--surface-light);
      color: var(--text-secondary);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .row-actions button.pdf-btn {
      border-color: rgba(167,139,250,.45);
      color: var(--accent-light);
    }
    .row-actions button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .detail {
      display: none;
      margin-top: 10px;
      padding: 16px;
      background: var(--bg);
      border-radius: 12px;
      border: 1px solid var(--surface);
      max-height: 520px;
      overflow: auto;
      text-align: left;
      min-width: min(720px, 70vw);
    }
    .detail.open { display: block; }
    .detail-section { margin-bottom: 18px; }
    .detail-section h4 {
      font-family: var(--font-display);
      font-size: 1.05rem;
      margin-bottom: 8px;
      color: var(--accent-light);
    }
    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .detail-chip {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--surface);
      color: var(--text-secondary);
    }
    .qa-block {
      border: 1px solid var(--surface);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.02);
    }
    .qa-q {
      font-weight: 700;
      font-size: 0.92rem;
      margin-bottom: 8px;
      color: var(--text);
    }
    .qa-a {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .qa-rank {
      display: grid;
      gap: 6px;
      margin-top: 6px;
    }
    .qa-rank-row {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 8px;
      align-items: start;
      font-size: 0.84rem;
      color: var(--text-secondary);
    }
    .qa-rank-row b {
      color: var(--accent-light);
      font-size: 0.78rem;
    }
    .qa-answer-pill {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .ans-relate { background: rgba(251,191,36,.15); color: #fbbf24; }
    .ans-harm { background: rgba(248,113,113,.15); color: #f87171; }
    .ans-none { background: rgba(34,197,94,.12); color: #86efac; }
    .ans-other { background: rgba(167,139,250,.12); color: #c4b5fd; }
    .detail-empty { color: var(--text-muted); font-size: 0.88rem; }
    .toolbar { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
    #dashboard { display: none; }
    #loginCard { display: block; }
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span>✦</span> The Soul Game</a>
    <div class="nav-links">
      <a href="../questionario.html">Chakra Quiz</a>
      <a href="../questionario-personalidade.html">Personality Quiz</a>
      <span class="nav-lang"><strong>Admin</strong></span>
    </div>
  </div>
</nav>

<main class="admin-wrap">
  <section class="admin-card" id="loginCard">
    <h1>Quiz Results</h1>
    <p class="admin-muted">Password-protected view of chakra and personality quiz submissions.</p>
    <form class="admin-form" id="loginForm">
      <div class="admin-field">
        <label for="password">Admin password</label>
        <input id="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="admin-btn" type="submit">Unlock</button>
    </form>
    <p class="admin-error" id="loginError" hidden></p>
  </section>

  <div id="dashboard">
    <section class="admin-card">
      <div class="toolbar">
        <h2 style="margin:0">Overview</h2>
        <button class="admin-btn secondary" type="button" id="logoutBtn">Lock</button>
      </div>
      <div class="stats-grid" id="statsGrid">
        <div class="stat"><b>—</b><span>Total</span></div>
        <div class="stat"><b>—</b><span>Chakra</span></div>
        <div class="stat"><b>—</b><span>Personality</span></div>
        <div class="stat"><b>—</b><span>Last 7 days</span></div>
      </div>
    </section>

    <section class="admin-card">
      <h2>Find a person</h2>
      <form class="admin-form" id="searchForm">
        <div class="admin-field">
          <label for="searchEmail">Email</label>
          <input id="searchEmail" type="search" placeholder="friend@email.com">
        </div>
        <div class="admin-field">
          <label for="searchName">Name (optional)</label>
          <input id="searchName" type="search" placeholder="Anna">
        </div>
        <button class="admin-btn" type="submit">Search</button>
        <button class="admin-btn secondary" type="button" id="recentBtn">Recent 50</button>
      </form>
      <p class="admin-error" id="searchError" hidden></p>
      <div style="overflow-x:auto;margin-top:18px">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Quiz</th>
              <th>Name</th>
              <th>Email</th>
              <th>Summary</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <tr><td colspan="6" style="color:var(--text-muted)">Search or load recent submissions.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</main>

<script>
(function () {
  const PASS_KEY = 'sg_admin_quiz_pass';
  const loginCard = document.getElementById('loginCard');
  const dashboard = document.getElementById('dashboard');
  const loginError = document.getElementById('loginError');
  const searchError = document.getElementById('searchError');
  const resultsBody = document.getElementById('resultsBody');
  const statsGrid = document.getElementById('statsGrid');

  function getPassword() {
    return sessionStorage.getItem(PASS_KEY) || '';
  }

  function setPassword(pw) {
    sessionStorage.setItem(PASS_KEY, pw);
  }

  function clearPassword() {
    sessionStorage.removeItem(PASS_KEY);
  }

  function showLogin() {
    loginCard.style.display = 'block';
    dashboard.style.display = 'none';
  }

  function showDashboard() {
    loginCard.style.display = 'none';
    dashboard.style.display = 'block';
  }

  async function api(action, extra) {
    const resp = await fetch('/api/admin-quiz', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: getPassword(), action, ...(extra || {}) }),
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(data.error || ('Error ' + resp.status));
    return data;
  }

  function shortSummary(row) {
    const s = row.summary || {};
    if (row.quiz_type === 'personality') {
      const top = s.top;
      return top ? (top.name + ' · ' + top.score + ' pts') : '—';
    }
    if (row.quiz_type === 'chakra') {
      const critical = s.criticalCount != null ? s.criticalCount + ' critical' : '';
      const prios = Array.isArray(s.priorityResults) && s.priorityResults.length
        ? 'prio: ' + s.priorityResults.slice(0, 3).join(', ')
        : '';
      return [critical, prios].filter(Boolean).join(' · ') || 'Map saved';
    }
    return '—';
  }

  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    } catch {
      return iso;
    }
  }

  function answerPill(label) {
    const t = String(label || '');
    let cls = 'ans-other';
    if (/harm/i.test(t)) cls = 'ans-harm';
    else if (/don.?t relate|não/i.test(t)) cls = 'ans-none';
    else if (/relate/i.test(t)) cls = 'ans-relate';
    return `<span class="qa-answer-pill ${cls}">${escapeHtml(t)}</span>`;
  }

  function renderPersonalityDetails(row) {
    const summary = row.summary || {};
    const answers = row.answers || {};
    const questions = answers.questions || [];
    const ranking = summary.ranking || [];

    let html = '<div class="detail-section"><h4>Result overview</h4><div class="detail-meta">';
    if (summary.top) {
      html += `<span class="detail-chip">Top: ${escapeHtml(summary.top.name)} (${escapeHtml(summary.top.score)} pts)</span>`;
    }
    ranking.slice(0, 3).forEach((a, i) => {
      html += `<span class="detail-chip">#${i + 1} ${escapeHtml(a.name)}</span>`;
    });
    html += '</div></div>';

    html += '<div class="detail-section"><h4>Questions & ranked answers</h4>';
    if (!questions.length) {
      html += '<p class="detail-empty">This older submission only has scores. New submissions will show each question and the ranked options.</p>';
      if (ranking.length) {
        html += '<div class="qa-block"><div class="qa-q">Final ranking</div><div class="qa-rank">';
        ranking.forEach((a) => {
          html += `<div class="qa-rank-row"><b>#${a.rank}</b><span>${escapeHtml(a.name)} · ${escapeHtml(a.chakra)} · ${escapeHtml(a.score)} pts</span></div>`;
        });
        html += '</div></div>';
      }
    } else {
      questions.forEach((q) => {
        html += `<div class="qa-block"><div class="qa-q">Q${q.number}. ${escapeHtml(q.title)}</div><div class="qa-rank">`;
        (q.ranking || []).forEach((r) => {
          html += `<div class="qa-rank-row"><b>#${r.rank}</b><span><strong>${escapeHtml(r.archetype)}</strong> (${escapeHtml(r.points)} pts)<br>${escapeHtml(r.answer)}</span></div>`;
        });
        html += '</div></div>';
      });
    }
    html += '</div>';
    return html;
  }

  function renderChakraDetails(row) {
    const summary = row.summary || {};
    const answers = row.answers || {};
    const chakras = answers.chakras || summary.chakras || [];

    let html = '<div class="detail-section"><h4>Map overview</h4><div class="detail-meta">';
    html += `<span class="detail-chip">${escapeHtml(summary.criticalCount ?? 0)} critical</span>`;
    (summary.priorityResults || []).forEach((name) => {
      html += `<span class="detail-chip">Priority: ${escapeHtml(name)}</span>`;
    });
    html += '</div></div>';

    html += '<div class="detail-section"><h4>Answers by chakra</h4>';
    if (!chakras.length) {
      html += '<p class="detail-empty">No readable answers stored for this submission.</p>';
    } else if (answers.chakras) {
      answers.chakras.forEach((c) => {
        html += `<div class="qa-block"><div class="qa-q">${escapeHtml(c.name)} Chakra</div>`;
        html += `<div class="qa-a">Imbalance: <strong>${escapeHtml(c.imbalance)}</strong> · Result in life: <strong>${escapeHtml(c.resultInLife)}</strong>${c.resultPriority ? ' · Priority' : ''}</div>`;
        if (c.resultQuestion) {
          html += `<div class="qa-a" style="margin-top:8px"><em>${escapeHtml(c.resultQuestion)}</em></div>`;
        }
        (c.blocks || []).forEach((b) => {
          html += `<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--surface)">`;
          html += `<div class="qa-q" style="font-size:0.86rem">${escapeHtml(b.question)}</div>`;
          html += answerPill(b.answer);
          html += `</div>`;
        });
        html += '</div>';
      });
    } else {
      // Older summary-only shape
      chakras.forEach((c) => {
        html += `<div class="qa-block"><div class="qa-q">${escapeHtml(c.name)}</div>`;
        html += `<div class="qa-a">Imbalance: <strong>${escapeHtml(c.imbalance)}</strong> · Result: <strong>${escapeHtml(c.result)}</strong></div>`;
        if (c.harms && c.harms.length) html += `<div class="qa-a" style="margin-top:6px">Harms: ${escapeHtml(c.harms.join(', '))}</div>`;
        if (c.relates && c.relates.length) html += `<div class="qa-a">Relates: ${escapeHtml(c.relates.join(', '))}</div>`;
        html += '</div>';
      });
    }
    html += '</div>';
    return html;
  }

  function renderDetails(row) {
    if (row.quiz_type === 'personality') return renderPersonalityDetails(row);
    if (row.quiz_type === 'chakra') return renderChakraDetails(row);
    return `<p class="detail-empty">Unknown quiz type.</p>`;
  }

  function slugify(s) {
    return String(s || 'user').toLowerCase().normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '') || 'user';
  }

  function canDownloadPdf(row) {
    if (row.quiz_type === 'personality') {
      return !!(row.answers && (row.answers.questions || row.summary?.ranking));
    }
    if (row.quiz_type === 'chakra') {
      return !!(row.answers && row.answers.chakras) || !!(row.summary && row.summary.chakras);
    }
    return false;
  }

  function downloadPersonalityPdf(row) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    const mx = 18;
    let y = 20;
    const today = new Date(row.created_at || Date.now());
    const questions = (row.answers && row.answers.questions) || [];
    const ranking = (row.summary && row.summary.ranking) || [];
    const maxPts = 175;

    function checkPage(need) {
      if (y + need > ph - 20) {
        doc.addPage();
        doc.setFillColor(10, 10, 15);
        doc.rect(0, 0, pw, ph, 'F');
        y = 20;
      }
    }

    doc.setFillColor(10, 10, 15);
    doc.rect(0, 0, pw, ph, 'F');
    doc.setTextColor(240, 239, 244);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(18);
    doc.text('Personality Profile', pw / 2, y, { align: 'center' });
    y += 7;
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(186, 181, 200);
    doc.text('The Soul Game - Personality Quiz', pw / 2, y, { align: 'center' });
    y += 5;
    doc.setFontSize(8);
    doc.text(row.name + ' · ' + row.email, pw / 2, y, { align: 'center' });
    y += 4;
    doc.text('Date: ' + today.toLocaleDateString('en-US'), pw / 2, y, { align: 'center' });
    y += 10;
    doc.setDrawColor(60, 60, 80);
    doc.line(mx, y, pw - mx, y);
    y += 8;

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(240, 239, 244);
    doc.text('YOUR ANSWERS', mx, y);
    y += 8;

    if (questions.length) {
      questions.forEach((q) => {
        checkPage(50);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);
        doc.setTextColor(167, 139, 250);
        const titleLines = doc.splitTextToSize('Question ' + q.number + ': ' + q.title, pw - mx * 2);
        doc.text(titleLines, mx, y);
        y += titleLines.length * 5 + 2;

        (q.ranking || []).forEach((r) => {
          checkPage(10);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(8);
          doc.setTextColor(r.rank <= 2 ? 245 : 186, r.rank <= 2 ? 158 : 181, r.rank <= 2 ? 11 : 200);
          doc.text('#' + r.rank + ' (' + r.points + 'pts)', mx, y);
          doc.setTextColor(220, 218, 230);
          const lines = doc.splitTextToSize((r.archetype ? r.archetype + ' — ' : '') + (r.answer || ''), pw - mx * 2 - 30);
          doc.text(lines, mx + 28, y);
          y += lines.length * 4 + 2;
        });
        y += 4;
      });
    } else {
      checkPage(20);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(186, 181, 200);
      doc.text('Detailed question rankings were not stored for this older submission.', mx, y);
      y += 8;
    }

    checkPage(40);
    doc.setDrawColor(60, 60, 80);
    doc.line(mx, y, pw - mx, y);
    y += 8;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(240, 239, 244);
    doc.text('FINAL RESULT', mx, y);
    y += 8;

    ranking.forEach((a, i) => {
      checkPage(12);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      if (i === 0) doc.setTextColor(245, 158, 11);
      else if (i === 1) doc.setTextColor(139, 92, 246);
      else if (i === 2) doc.setTextColor(236, 72, 153);
      else doc.setTextColor(186, 181, 200);
      doc.text('#' + (a.rank || i + 1) + '  ' + a.name, mx, y);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      const pct = maxPts ? ((a.score / maxPts) * 100).toFixed(0) : '0';
      doc.text((a.chakra || '') + ' Chakra  -  ' + a.score + ' pts (' + pct + '%)', mx + 2, y + 4);
      y += 12;
    });

    y += 6;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(122, 118, 144);
    doc.text('The Soul Game - Self-knowledge and personal growth', pw / 2, y, { align: 'center' });

    doc.save('personality-profile-' + slugify(row.name) + '-' + today.toISOString().slice(0, 10) + '.pdf');
  }

  function downloadChakraPdf(row) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const W = 210;
    const M = 15;
    const cW = W - 2 * M;
    let y = M;
    const today = new Date(row.created_at || Date.now());
    const chakras = (row.answers && row.answers.chakras) || [];
    const summaryChakras = (row.summary && row.summary.chakras) || [];
    const COLORS = {
      bg: [18, 18, 30], surface: [30, 30, 48], accent: [139, 92, 246],
      textPrimary: [240, 240, 245], textSecondary: [180, 180, 195], textMuted: [120, 120, 140],
      identifico: [251, 191, 36], prejudica: [248, 113, 113],
      green: [34, 197, 94], orange: [249, 115, 22], yellow: [234, 179, 8], red: [239, 68, 68],
    };

    function pageBg() {
      doc.setFillColor(...COLORS.bg);
      doc.rect(0, 0, W, 297, 'F');
    }
    function checkPage(need) {
      if (y + need > 280) {
        doc.addPage();
        pageBg();
        y = M;
      }
    }
    function setFont(size, style) {
      doc.setFontSize(size);
      doc.setFont('helvetica', style === 'bold' ? 'bold' : 'normal');
    }

    pageBg();
    doc.setFillColor(...COLORS.accent);
    doc.roundedRect(M, y, cW, 32, 3, 3, 'F');
    setFont(18, 'bold');
    doc.setTextColor(255, 255, 255);
    doc.text('Chakra Map - Answer Sheet', W / 2, y + 11, { align: 'center' });
    setFont(9, 'normal');
    doc.setTextColor(220, 220, 235);
    doc.text(row.name + ' · ' + row.email, W / 2, y + 19, { align: 'center' });
    doc.text('Generated on ' + today.toLocaleDateString('en-US'), W / 2, y + 26, { align: 'center' });
    y += 40;

    setFont(13, 'bold');
    doc.setTextColor(...COLORS.accent);
    doc.text('PART 1 - ANSWERS BY CHAKRA', M, y);
    y += 8;

    if (chakras.length) {
      chakras.forEach((c) => {
        checkPage(28);
        doc.setFillColor(...COLORS.surface);
        doc.roundedRect(M, y, cW, 8, 2, 2, 'F');
        setFont(11, 'bold');
        doc.setTextColor(...COLORS.textPrimary);
        doc.text(c.name + ' Chakra', M + 4, y + 5.5);
        y += 12;

        let hasMark = false;
        (c.blocks || []).forEach((b) => {
          const key = b.answerKey;
          const label = b.answer || '';
          const isHarm = key === 'prejudica' || /harm/i.test(label);
          const isRelate = key === 'identifico' || (/relate/i.test(label) && !/don.?t/i.test(label));
          if (!isHarm && !isRelate) return;
          hasMark = true;
          checkPage(16);
          setFont(8, 'bold');
          doc.setTextColor(...(isHarm ? COLORS.prejudica : COLORS.identifico));
          doc.text(isHarm ? 'IT HARMS ME' : 'I RELATE', M + 4, y);
          setFont(8, 'normal');
          doc.setTextColor(...COLORS.textMuted);
          doc.text(' - ' + (b.question || ''), M + 4 + doc.getTextWidth(isHarm ? 'IT HARMS ME' : 'I RELATE') + 1, y);
          y += 5;
          if (Array.isArray(b.items) && b.items.length) {
            setFont(7.5, 'normal');
            doc.setTextColor(...COLORS.textSecondary);
            b.items.forEach((item) => {
              checkPage(5);
              const lines = doc.splitTextToSize('• ' + item, cW - 10);
              doc.text(lines, M + 6, y);
              y += lines.length * 3.5;
            });
          }
          y += 3;
        });

        if (!hasMark) {
          setFont(8, 'normal');
          doc.setTextColor(...COLORS.textMuted);
          doc.text('No blocks marked as imbalance', M + 4, y);
          y += 5;
        }

        checkPage(12);
        setFont(8, 'bold');
        doc.setTextColor(...COLORS.textMuted);
        doc.text('RESULT IN LIFE: ' + (c.resultInLife || '—') + (c.resultPriority ? ' * PRIORITY' : ''), M + 4, y);
        y += 5;
        if (c.resultQuestion) {
          setFont(7.5, 'normal');
          doc.setTextColor(...COLORS.textSecondary);
          const lines = doc.splitTextToSize(c.resultQuestion, cW - 8);
          doc.text(lines, M + 4, y);
          y += lines.length * 3.5 + 4;
        }
        y += 4;
      });
    } else {
      setFont(9, 'normal');
      doc.setTextColor(...COLORS.textMuted);
      doc.text('Detailed block answers were not stored for this older submission.', M, y);
      y += 10;
    }

    doc.addPage();
    pageBg();
    y = M;
    setFont(13, 'bold');
    doc.setTextColor(...COLORS.accent);
    doc.text('PART 2 - ENERGY MAP', M, y);
    y += 10;

    const mapRows = chakras.length ? chakras : summaryChakras;
    mapRows.forEach((c) => {
      checkPage(20);
      doc.setFillColor(...COLORS.surface);
      doc.roundedRect(M, y, cW, 16, 2, 2, 'F');
      setFont(10, 'bold');
      doc.setTextColor(...COLORS.textPrimary);
      doc.text((c.name || '') + ' Chakra', M + 4, y + 6);
      setFont(8, 'normal');
      doc.setTextColor(...COLORS.textSecondary);
      const imbalance = c.imbalance || '—';
      const result = c.resultInLife || c.result || '—';
      doc.text('Imbalance: ' + imbalance + '   |   Result: ' + result + (c.resultPriority || c.priorityResult ? '   |   Priority' : ''), M + 4, y + 12);
      y += 20;
    });

    if (row.summary && Array.isArray(row.summary.priorityResults) && row.summary.priorityResults.length) {
      checkPage(20);
      setFont(9, 'bold');
      doc.setTextColor(...COLORS.accent);
      doc.text('PRIORITY RESULTS: ' + row.summary.priorityResults.join(', '), M, y);
      y += 8;
    }

    checkPage(12);
    setFont(7, 'normal');
    doc.setTextColor(...COLORS.textMuted);
    doc.text('This map is a tool for self-knowledge, not a diagnosis.', W / 2, y + 4, { align: 'center' });
    doc.text('The Soul Game', W / 2, y + 9, { align: 'center' });

    doc.save('chakra-map-' + slugify(row.name) + '-' + today.toISOString().slice(0, 10) + '.pdf');
  }

  function downloadRowPdf(index) {
    const row = window.__adminRows && window.__adminRows[index];
    if (!row) return;
    if (!window.jspdf || !window.jspdf.jsPDF) {
      alert('PDF library failed to load. Refresh and try again.');
      return;
    }
    if (!canDownloadPdf(row)) {
      alert('This older submission does not have enough data to rebuild the PDF. Ask them to retake the quiz.');
      return;
    }
    if (row.quiz_type === 'personality') downloadPersonalityPdf(row);
    else if (row.quiz_type === 'chakra') downloadChakraPdf(row);
  }

  function renderRows(rows) {
    window.__adminRows = rows || [];
    if (!rows || !rows.length) {
      resultsBody.innerHTML = '<tr><td colspan="6" style="color:var(--text-muted)">No submissions found.</td></tr>';
      return;
    }

    resultsBody.innerHTML = rows.map((row, i) => {
      const badge = row.quiz_type === 'chakra'
        ? '<span class="badge badge-chakra">Chakra</span>'
        : '<span class="badge badge-personality">Personality</span>';
      const detailId = 'detail-' + i;
      const pdfDisabled = canDownloadPdf(row) ? '' : ' disabled title="Not enough data on this older submission"';
      return `
        <tr>
          <td>${formatDate(row.created_at)}</td>
          <td>${badge}</td>
          <td>${escapeHtml(row.name)}</td>
          <td>${escapeHtml(row.email)}</td>
          <td>${escapeHtml(shortSummary(row))}</td>
          <td class="row-actions">
            <div class="btn-row">
              <button type="button" data-toggle="${detailId}">Details</button>
              <button type="button" class="pdf-btn" data-pdf="${i}"${pdfDisabled}>Download PDF</button>
            </div>
            <div class="detail" id="${detailId}">${renderDetails(row)}</div>
          </td>
        </tr>`;
    }).join('');

    resultsBody.querySelectorAll('[data-toggle]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const el = document.getElementById(btn.getAttribute('data-toggle'));
        el.classList.toggle('open');
      });
    });
    resultsBody.querySelectorAll('[data-pdf]').forEach((btn) => {
      btn.addEventListener('click', () => downloadRowPdf(Number(btn.getAttribute('data-pdf'))));
    });
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function loadStats() {
    const stats = await api('stats');
    statsGrid.innerHTML = `
      <div class="stat"><b>${stats.total}</b><span>Total</span></div>
      <div class="stat"><b>${stats.chakra}</b><span>Chakra</span></div>
      <div class="stat"><b>${stats.personality}</b><span>Personality</span></div>
      <div class="stat"><b>${stats.last7Days}</b><span>Last 7 days</span></div>`;
  }

  async function unlockAndLoad() {
    showDashboard();
    await loadStats();
    const recent = await api('recent', { limit: 50 });
    renderRows(recent.rows);
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.hidden = true;
    const pw = document.getElementById('password').value;
    setPassword(pw);
    try {
      await api('stats');
      await unlockAndLoad();
    } catch (err) {
      clearPassword();
      showLogin();
      loginError.hidden = false;
      loginError.textContent = err.message || 'Could not unlock';
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    clearPassword();
    showLogin();
    document.getElementById('password').value = '';
  });

  document.getElementById('searchForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    searchError.hidden = true;
    try {
      const data = await api('search', {
        email: document.getElementById('searchEmail').value.trim(),
        name: document.getElementById('searchName').value.trim(),
        limit: 100,
      });
      renderRows(data.rows);
    } catch (err) {
      searchError.hidden = false;
      searchError.textContent = err.message || 'Search failed';
    }
  });

  document.getElementById('recentBtn').addEventListener('click', async () => {
    searchError.hidden = true;
    try {
      const data = await api('recent', { limit: 50 });
      renderRows(data.rows);
    } catch (err) {
      searchError.hidden = false;
      searchError.textContent = err.message || 'Load failed';
    }
  });

  if (getPassword()) {
    unlockAndLoad().catch(() => {
      clearPassword();
      showLogin();
    });
  }
})();
</script>
</body>
</html>
